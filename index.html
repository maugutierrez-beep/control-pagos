function sbGet(t){return fetch(SB_URL+"/rest/v1/"+t+"?select=*",{headers:sbH()}).then(function(r){return r.json()})}
function sbUpsert(t,rows){return fetch(SB_URL+"/rest/v1/"+t,{method:"POST",headers:Object.assign({},sbH(),{"Prefer":"resolution=merge-duplicates"}),body:JSON.stringify(rows)})}
function sbDel(t,id){return fetch(SB_URL+"/rest/v1/"+t+"?id=eq."+encodeURIComponent(id),{method:"DELETE",headers:sbH()})}

function cop(n){return new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n||0)}
function hoy(){return new Date()}
function mAct(){var d=hoy();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function todayStr(){var d=hoy();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function mLbl(ym){if(!ym)return"—";var p=ym.split("-");return ML[+p[1]-1]+" "+p[0]}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function fmtDate(s){if(!s)return"";var p=s.split("-");if(p.length<3)return s;return p[2]+" "+MS[+p[1]-1]+" "+p[0]}

function allProps(){
  var list=DEFAULT_PROPS.slice();
  F.forEach(function(f){if(f.p&&f.p!=="—"&&list.indexOf(f.p)===-1)list.push(f.p)});
  return list;
}

function fV(f){
  var d=hoy(),ref=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  var mk=function(y,m){var fin=new Date(y,m+1,0).getDate();return new Date(y,m,Math.min(f.d,fin))};
  var fecha=mk(d.getFullYear(),d.getMonth()),dif=Math.round((fecha-ref)/864e5);
  if(dif<-5){fecha=mk(d.getFullYear(),d.getMonth()+1);dif=Math.round((fecha-ref)/864e5)}
  return{fecha:fecha,dif:dif}
}
function est(f){if(f.pm===mAct())return"pagada";var d=fV(f).dif;return d<0?"venc":d<=5?"prox":"pend"}
function matchQ(f){if(!query)return true;var q=query.toLowerCase();return(f.n||"").toLowerCase().indexOf(q)>-1||(f.c||"").toLowerCase().indexOf(q)>-1||(f.p||"").toLowerCase().indexOf(q)>-1||(f.no||"").toLowerCase().indexOf(q)>-1}

function checkArchive(){
  var ma=mAct();
  var toArchive=F.filter(function(f){return f.pm&&f.pm!==ma});
  if(!toArchive.length)return;
  var rows=toArchive.map(function(f){return{fid:f.id,n:f.n,c:f.c,p:f.p,m:f.m,mes:f.pm,cp:f.cp||"",cn:f.cn||"",pf:f.pf||""}});
  sbUpsert("historico",rows).then(function(){
    var promises=toArchive.map(function(f){f.pm=null;f.cp="";f.cn="";f.pf="";return sbUpsert("facturas",[{id:f.id,n:f.n,c:f.c,p:f.p,m:f.m,d:f.d,no:f.no||"",pm:null,cp:"",cn:"",pf:""}])});
    Promise.all(promises).then(function(){render()});
  });
}

function load(){
  document.getElementById("content").innerHTML='<div class="loading">Cargando…</div>';
  Promise.all([sbGet("facturas"),sbGet("historico"),sbGet("notas_mes"),sbGet("suscripciones")]).then(function(res){
    var dbF=res[0],dbH=res[1],dbN=res[2],dbS=res[3];
    S=Array.isArray(dbS)?dbS:[];
    F=Array.isArray(dbF)?dbF.map(function(f){return Object.assign({},f,{m:Number(f.m),d:Number(f.d)})}):[];
    H=Array.isArray(dbH)?dbH.map(function(h){return Object.assign({},h,{m:Number(h.m)})}):[];
    var nm=Array.isArray(dbN)?dbN.find(function(n){return n.mes===mAct()}):null;
    notaMes=nm?nm.nota:"";
    checkArchive();
    render();
  }).catch(function(){
    showToast("Error de conexión.",true);
    document.getElementById("content").innerHTML='<div class="empty">Error de conexión.</div>';
  });
}

function saveF(f){
  return sbUpsert("facturas",[{id:f.id,n:f.n,c:f.c,p:f.p,m:f.m,d:f.d,no:f.no||"",pm:f.pm||null,cp:f.cp||"",cn:f.cn||"",pf:f.pf||""}]);
}

function saveNota(){
  var v=document.getElementById("notaInput").value;
  notaMes=v;
  sbUpsert("notas_mes",[{mes:mAct(),nota:v,updated_at:new Date().toISOString()}]).then(function(){showToast("✓ Nota guardada.")});
}

function renderCal(){
  var d=hoy(),yr=d.getFullYear(),mo=d.getMonth();
  var dim=new Date(yr,mo+1,0).getDate();
  var html='<div class="cal"><div class="cal-title">'+ML[mo].charAt(0).toUpperCase()+ML[mo].slice(1)+" "+yr+'</div><div class="cal-grid">';
  var dias=["D","L","M","X","J","V","S"];
  for(var day=1;day<=dim;day++){
    var fecha=new Date(yr,mo,day);
    var isToday=day===d.getDate();
    var dayF=F.filter(function(f){var r=fV(f);return r.fecha.getDate()===fecha.getDate()&&r.fecha.getMonth()===fecha.getMonth()&&r.fecha.getFullYear()===fecha.getFullYear()});
    var dots=dayF.map(function(f){return'<div class="cal-dot '+est(f)+'"></div>'}).join("");
    var total=dayF.reduce(function(s,f){return s+f.m},0);
    var amtStr=total>0?cop(total).replace("$","").replace(/\./g,"").replace(",",""):"";
    if(amtStr.length>5)amtStr=amtStr.slice(0,-3)+"K";
    html+='<div class="cal-day'+(isToday?" today":"")+'"><div class="dn">'+dias[fecha.getDay()]+'</div><div class="dd">'+day+'</div><div class="dots">'+dots+'</div>'+(total>0?'<div class="amt">$'+amtStr+'</div>':'')+'</div>';
  }
  html+='</div></div>';
  return html;
}

function render(){
  var base=F.filter(function(f){return(fCat==="Todas"||f.c===fCat)&&(fProp==="Todas"||f.p===fProp)&&matchQ(f)});
  var allM=F.reduce(function(s,f){return s+f.m},0);
  var pgM=F.filter(function(f){return est(f)==="pagada"}).reduce(function(s,f){return s+f.m},0);
  var pct=allM>0?Math.round(pgM/allM*100):0;
  document.getElementById("progress").innerHTML='<div class="pbar"><div class="plbl"><span>'+pct+'% pagado</span><b>Falta: '+cop(allM-pgM)+'</b></div><div class="ptrack"><div class="pfill" style="width:'+pct+'%"></div></div></div>';

  // Nota del mes
  document.getElementById("notames").innerHTML='<div class="nota-mes"><div class="nlbl">📝 Nota de '+mLbl(mAct())+'</div><textarea id="notaInput" placeholder="Observaciones del mes…">'+esc(notaMes)+'</textarea><button class="nsave" onclick="saveNota()">Guardar</button></div>';

  var t=0,pg=0,pe=0,ve=0;
  base.forEach(function(f){t+=f.m;var e=est(f);if(e==="pagada")pg+=f.m;else if(e==="venc")ve+=f.m;else pe+=f.m});
  document.getElementById("totales").innerHTML=[["Total",t,"#1e293b"],["Pagado",pg,"#15803d"],["Pendiente",pe,"#b45309"],["Vencido",ve,"#dc2626"]].map(function(x){return'<div class="tot"><div class="tl">'+x[0]+'</div><div class="tv" style="color:'+x[2]+'">'+cop(x[1])+'</div></div>'}).join("");

  if((vista==="porpagar"||vista==="delegado")&&!query){
    var pn=F.filter(function(f){return est(f)!=="pagada"});
    var vc=pn.filter(function(f){return fV(f).dif<0});
    var hh=pn.filter(function(f){return fV(f).dif===0});
    var mn=pn.filter(function(f){return fV(f).dif===1});
    var ft=pn.filter(function(f){return fV(f).dif>1}).sort(function(a,b){return fV(a).dif-fV(b).dif});
    var a="";
    if(vc.length)a+=mkAc("red","⚠ "+vc.length+" vencida"+(vc.length>1?"s":"")+" · "+cop(vc.reduce(function(s,f){return s+f.m},0)),vc);
    if(hh.length)a+=mkAc("red","Hoy · "+cop(hh.reduce(function(s,f){return s+f.m},0)),hh);
    if(mn.length)a+=mkAc("amb","Mañana · "+cop(mn.reduce(function(s,f){return s+f.m},0)),mn);
    if(!vc.length&&!hh.length&&!mn.length){
      if(ft.length){var dd=fV(ft[0]).dif;var g=ft.filter(function(f){return fV(f).dif===dd});var fch=fV(g[0]).fecha;
        a+=mkAc("blu","Próximo: "+fch.getDate()+" "+MS[fch.getMonth()]+" · en "+dd+"d · "+cop(g.reduce(function(s,f){return s+f.m},0)),g)}
      else a='<div class="ac grn"><div class="at">✓ Todo al día</div></div>';
    }
    document.getElementById("alerta").innerHTML=a;
  }else document.getElementById("alerta").innerHTML="";

  document.getElementById("searchBox").style.display=(vista==="porpagar"||vista==="pagadas")?"block":"none";

  var npg=F.filter(function(f){return est(f)==="pagada"}).length;
  document.getElementById("tabs").innerHTML=[["porpagar","Por pagar ("+(F.length-npg)+")"],["pagadas","Pagadas ("+npg+")"],["propiedad","Propiedad"],["historico","Histórico"],["delegado","✈ Viaje"],["suscripciones","💳 Suscripciones"]].map(function(x){return'<button class="'+(vista===x[0]?"on":"")+'" onclick="setVista(\''+x[0]+'\')">'+x[1]+'</button>'}).join("");

  if(vista==="porpagar"||vista==="pagadas"){
    var props=allProps().filter(function(p){return p!=="—"});props.sort();
    document.getElementById("chips").innerHTML=
      ["Todas"].concat(CATS).map(function(c){return'<button class="chip'+(fCat===c?" on":"")+'" onclick="setFCat(\''+esc(c)+'\')">'+esc(c)+'</button>'}).join("")+
      '<span style="width:6px;display:inline-block"></span>'+
      ["Todas"].concat(props).map(function(p){return'<button class="chip pur'+(fProp===p?" on":"")+'" onclick="setFProp(\''+esc(p)+'\')">'+esc(p==="Todas"?"Todas prop.":p)+'</button>'}).join("");
  }else document.getElementById("chips").innerHTML="";

  var ct=document.getElementById("content");

  if(vista==="porpagar"||vista==="pagadas"){
    var list=base.filter(function(f){return vista==="pagadas"?est(f)==="pagada":est(f)!=="pagada"});
    if(vista==="pagadas")list.sort(function(a,b){return a.n.localeCompare(b.n)});
    else{var o={venc:0,prox:1,pend:2};list.sort(function(a,b){return o[est(a)]-o[est(b)]||fV(a).dif-fV(b).dif})}
    if(!list.length){ct.innerHTML='<div class="empty">'+(query?"Sin resultados":"¡Todo al día!")+'</div>';return}
    ct.innerHTML=renderCal()+list.map(function(f){
      var e=est(f),r=fV(f),fs=r.fecha.getDate()+" "+MS[r.fecha.getMonth()]+" "+r.fecha.getFullYear();
      var rel=r.dif<0?"venció hace "+Math.abs(r.dif)+"d":r.dif===0?"hoy":r.dif===1?"mañana":"en "+r.dif+"d";
      var pt=f.p&&f.p!=="—"?'<span class="ptag">'+esc(f.p)+'</span>':"";
      var cpTxt=[];
      if(f.pf)cpTxt.push("Pagado el "+fmtDate(f.pf));
      if(f.cp)cpTxt.push(esc(f.cp)+(f.cn?" · "+esc(f.cn):""));
      var cp=cpTxt.length?'<div class="cp">✓ '+cpTxt.join(" · ")+'</div>':"";
      var mt=e==="pagada"?"Pagada en <b>"+mLbl(f.pm)+"</b>":"Vence <b>"+fs+"</b> · "+rel;
      var btns=e==="pagada"?'<button class="undo" onclick="doUndo(\''+f.id+'\')">↩</button>':'<button class="pg" onclick="doPg(\''+f.id+'\')">✓</button>';
      btns+='<button class="edt" onclick="doEdit(\''+f.id+'\')">✎</button><button class="del" onclick="doDel(\''+f.id+'\')">✕</button>';
      return'<div class="row '+(e==="pagada"?"pagada":e)+'"><div class="info"><div class="nm">'+esc(f.n)+pt+'</div><div class="meta">'+esc(f.c)+' · '+mt+'</div>'+(f.no?'<div class="nt">'+esc(f.no)+'</div>':'')+cp+'</div><div class="mn">'+cop(f.m)+'</div><div class="acc">'+btns+'</div></div>';
    }).join("");
  }

  if(vista==="propiedad"){
    var mp={};F.forEach(function(f){var key=f.p&&f.p!=="—"?f.p:"Sin propiedad";if(!mp[key])mp[key]={t:0,pg:0,pe:0,items:[]};mp[key].t+=f.m;mp[key].items.push(f);if(est(f)==="pagada")mp[key].pg+=f.m;else mp[key].pe+=f.m});
    ct.innerHTML=Object.keys(mp).sort(function(a,b){return mp[b].t-mp[a].t}).map(function(prop){var d=mp[prop];
      return'<div class="pcard"><div class="ph"><div><div class="pn">'+esc(prop)+'</div><div class="ps">'+d.items.length+' factura'+(d.items.length>1?"s":"")+'</div></div><div style="text-align:right"><div class="ptt">'+cop(d.t)+'</div><div class="ps">'+cop(d.pg)+' pagado · '+cop(d.pe)+' pend.</div></div></div>'+
      d.items.map(function(f){var e=est(f);return'<div class="pi"><span>'+esc(f.n)+' <span class="est '+(e==="pagada"?"epg":e==="venc"?"evc":"epe")+'">'+(e==="pagada"?"✓":"Pend.")+'</span></span><span style="font-weight:600">'+cop(f.m)+'</span></div>'}).join("")+'</div>';
    }).join("")||'<div class="empty">No hay facturas.</div>';
  }

  if(vista==="historico"){
    var meses=[];var mseen={};H.forEach(function(h){if(!mseen[h.mes]){mseen[h.mes]=1;meses.push(h.mes)}});meses.sort().reverse();
    var htot={};H.forEach(function(h){htot[h.mes]=(htot[h.mes]||0)+h.m});
    var hf=hMes?H.filter(function(h){return h.mes===hMes}):H;
    var html='<div class="chips"><button class="chip'+(!hMes?" on":"")+'" onclick="setHMes(null)">Todos</button>';
    meses.forEach(function(m){html+='<button class="chip'+(hMes===m?" on":"")+'" onclick="setHMes(\''+m+'\')">'+mLbl(m)+'</button>'});
    html+='</div>';
    if(meses.length&&!hMes){
      html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">';
      meses.forEach(function(m){html+='<div class="hmcard" onclick="setHMes(\''+m+'\')"><div style="font-size:11px;color:#94a3b8;margin-bottom:4px">'+mLbl(m)+'</div><div style="font-size:16px;font-weight:600;color:#15803d">'+cop(htot[m]||0)+'</div></div>'});
      html+='</div>';
    }
    if(!hf.length)html+='<div class="empty">Los pagos anteriores se archivan aquí al inicio de cada mes.</div>';
    else hf.forEach(function(h){html+='<div class="hcard"><div class="info"><div class="nm">'+esc(h.n)+(h.p&&h.p!=="—"?'<span class="ptag">'+esc(h.p)+'</span>':"")+'</div><div class="meta">'+esc(h.c)+' · '+mLbl(h.mes)+(h.pf?" · Pagado el "+fmtDate(h.pf):"")+'</div>'+(h.cp?'<div class="cp">✓ '+esc(h.cp)+(h.cn?" · "+esc(h.cn):"")+'</div>':"")+'</div><div class="mn">'+cop(h.m)+'</div></div>'});
    ct.innerHTML=html;
  }

  if(vista==="delegado"){
    var hoyS=todayStr();
    if(!delDesde)delDesde=hoyS;
    if(!delHasta){var t2=new Date(hoy());t2.setDate(t2.getDate()+30);delHasta=t2.getFullYear()+"-"+String(t2.getMonth()+1).padStart(2,"0")+"-"+String(t2.getDate()).padStart(2,"0")}
    var desde=new Date(delDesde),hasta=new Date(delHasta);
    var enViaje=F.filter(function(f){
      if(est(f)==="pagada")return false;
      var r=fV(f);return r.fecha>=desde&&r.fecha<=hasta;
    }).sort(function(a,b){return fV(a).fecha-fV(b).fecha});
    var totalViaje=enViaje.reduce(function(s,f){return s+f.m},0);
    var html='<div class="del-banner"><div class="dt">✈ Modo viaje</div><div class="ds">Facturas que vencen mientras estás fuera</div>';
    html+='<div class="del-dates"><label>Desde<input type="date" value="'+delDesde+'" onchange="delDesde=this.value;render()"></label><label>Hasta<input type="date" value="'+delHasta+'" onchange="delHasta=this.value;render()"></label></div>';
    if(enViaje.length){
      enViaje.forEach(function(f){var r=fV(f);html+='<div class="di">• '+esc(f.n)+' — '+cop(f.m)+' — '+r.fecha.getDate()+" "+MS[r.fecha.getMonth()]+'</div>'});
      html+='<div style="margin-top:8px;font-size:13px;font-weight:700;color:#93c5fd">Total: '+cop(totalViaje)+'</div>';
    }else html+='<div class="di" style="color:#93c5fd">✓ No hay vencimientos en ese período</div>';
    html+='<div class="del-dc"><button class="del-btn-copy" onclick="copiarViaje()">📋 Copiar para WhatsApp</button><button class="del-btn-pdf" onclick="exportarPDF()">⬇ PDF</button></div></div>';
    ct.innerHTML=html;
  }


  if(vista==="suscripciones"){
    var activas=S.filter(function(s){return s.activa});
    var inactivas=S.filter(function(s){return !s.activa});
    var totalMes=activas.reduce(function(sum,s){
      if(s.moneda!=="COP")return sum;
      return sum+(s.frecuencia==="anual"?Math.round(s.monto/12):s.monto);
    },0);
    var totalAnual=activas.reduce(function(sum,s){
      if(s.moneda!=="COP")return sum;
      return sum+(s.frecuencia==="anual"?s.monto:s.monto*12);
    },0);
    // Group by tarjeta
    var tarjetas={};
    activas.forEach(function(s){var t=s.tarjeta||"Sin tarjeta";if(!tarjetas[t])tarjetas[t]=[];tarjetas[t].push(s)});
    var html='<div class="sus-summary">';
    html+='<div class="sus-sum-card"><div class="sl">Activas</div><div class="sv">'+activas.length+'</div></div>';
    html+='<div class="sus-sum-card"><div class="sl">Costo mensual</div><div class="sv" style="color:#0d2138">'+cop(totalMes)+'</div></div>';
    html+='<div class="sus-sum-card"><div class="sl">Costo anual</div><div class="sv" style="color:#475569">'+cop(totalAnual)+'</div></div>';
    html+='</div>';
    Object.keys(tarjetas).sort().forEach(function(t){
      var list=tarjetas[t];
      var tTotal=list.reduce(function(sum,s){return sum+(s.frecuencia==="anual"?Math.round(s.monto/12):s.monto)},0);
      html+='<div class="sus-grp"><div class="sus-grp-title">'+esc(t)+' · '+cop(tTotal)+'/mes</div>';
      list.forEach(function(s){
        var icon={"Salud":"🏃","Entretenimiento":"🎬","Productividad":"⚡","IA / Tech":"🤖","Música":"🎵","Noticias":"📰","Almacenamiento":"💾","Otros":"📦"}[s.categoria]||"📦";
        var frqTag=s.frecuencia==="anual"?'<span class="stag anu">Anual</span>':'<span class="stag men">Mensual</span>';
        var montoMes=s.frecuencia==="anual"?Math.round(s.monto/12):s.monto;
        var proxFmt=s.proximo_cobro?fmtDate(s.proximo_cobro):"—";
        html+='<div class="sus-card'+(s.activa?"":" inactiva")+'"><div class="si">'+icon+'</div>';
        html+='<div class="sinfo"><div class="sn">'+esc(s.n)+frqTag+'</div>';
        html+='<div class="smeta">'+esc(s.servicio||"")+(s.notas?' · <span style="font-style:italic">'+esc(s.notas)+'</span>':'')+'</div>';
        html+='<div class="smeta">Próximo cobro: <b>'+proxFmt+'</b></div></div>';
        html+='<div class="smonto"><div class="mv">'+cop(montoMes)+'</div><div class="mf">/mes</div></div>';
        html+='<div class="sacc"><button class="edt" onclick="editSus(''+s.id+'')">✎</button><button class="del" onclick="delSus(''+s.id+'')">✕</button></div></div>';
      });
      html+='</div>';
    });
    if(inactivas.length){
      html+='<div class="sus-grp"><div class="sus-grp-title">Inactivas ('+inactivas.length+')</div>';
      inactivas.forEach(function(s){
        html+='<div class="sus-card inactiva"><div class="si">📦</div><div class="sinfo"><div class="sn">'+esc(s.n)+'</div><div class="smeta">'+esc(s.tarjeta||"")+'</div></div><div class="smonto"><div class="mv">'+cop(s.monto)+'</div></div><div class="sacc"><button class="edt" onclick="editSus(''+s.id+'')">✎</button><button class="del" onclick="delSus(''+s.id+'')">✕</button></div></div>';
      });
      html+='</div>';
    }
    html+='<button onclick="openSusModal(null)" style="width:100%;padding:12px;background:#f1f5f9;border:1px dashed #cbd5e1;border-radius:10px;font-size:14px;color:#64748b;cursor:pointer;font-weight:600">+ Nueva suscripción</button>';
    ct.innerHTML=html;
  }

  document.getElementById("backup").innerHTML='<div class="bkp"><button onclick="descargar()">⬇ Descargar respaldo</button></div>';
}

function mkAc(cls,titulo,items){
  return'<div class="ac '+cls+'"><div class="at">'+titulo+'</div><div class="ai">'+items.map(function(f){return'<div><span>'+esc(f.n)+'</span><span class="am">'+cop(f.m)+'</span></div>'}).join("")+'</div></div>';
}

function setVista(v){vista=v;render()}
function setFCat(c){fCat=c;render()}
function setFProp(p){fProp=p;render()}
function setHMes(m){hMes=m;render()}
function onSearch(){query=document.getElementById("searchInput").value;render()}

function doPg(id){
  pgId=id;
  var f=F.find(function(x){return x.id===id});if(!f)return;
  document.getElementById("pgName").textContent=f.n+" · "+cop(f.m);
  document.getElementById("pgRef").value="";
  document.getElementById("pgNota").value="";
  document.getElementById("pgDate").value=todayStr();
  document.getElementById("pgModal").classList.add("open");
}
function closePg(){document.getElementById("pgModal").classList.remove("open")}
function doPago(skip){
  var f=F.find(function(x){return x.id===pgId});if(!f)return;
  f.pm=mAct();
  f.pf=skip?"":document.getElementById("pgDate").value;
  f.cp=skip?"":document.getElementById("pgRef").value.trim();

function syncGmail(){
  document.getElementById("syncBtn").textContent="⏳…";
  document.getElementById("syncBtn").disabled=true;
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,
      messages:[{role:"user",content:"Search my Gmail for the last 30 days. Find payment confirmations and new invoices. Respond ONLY with JSON array. Each: {\"type\":\"paid\" or \"invoice\",\"name\":\"service name\",\"amount\":number,\"date\":\"YYYY-MM-DD\",\"ref\":\"reference\",\"due_day\":number,\"category\":\"Servicios Públicos\",\"notes\":\"brief\"}"}],
      mcp_servers:[{type:"url",url:"https://gmailmcp.googleapis.com/mcp/v1",name:"gmail"}]
    })
  }).then(function(r){return r.json()}).then(function(data){
    var txt=(data.content||[]).filter(function(c){return c.type==="text"}).map(function(c){return c.text}).join("");
    var clean=txt.replace(/```json|```/g,"").trim();
    var updated=0,added=0,promises=[];
    if(clean.charAt(0)==="["){
      JSON.parse(clean).forEach(function(p){
        var nm=(p.name||"").toLowerCase();
        var match=F.find(function(f){return f.n.toLowerCase().indexOf(nm)>-1&&f.pm!==mAct()});
        if(match&&p.type==="paid"){match.pm=mAct();match.cp=p.ref||"Gmail";match.cn=p.date||"";match.pf=p.date||"";promises.push(saveF(match));updated++}
        else if(p.amount>0&&!F.some(function(f){return f.n.toLowerCase().indexOf(nm)>-1})){
          var nf={id:"s"+Date.now()+Math.random().toString(36).slice(2,5),n:p.name,c:p.category||"Servicios Públicos",p:"—",m:p.amount,d:p.due_day||1,no:p.notes||"",pm:p.type==="paid"?mAct():null,cp:p.type==="paid"?(p.ref||"Gmail"):"",cn:p.type==="paid"?(p.date||""):"",pf:p.type==="paid"?(p.date||""):""};
          F.push(nf);promises.push(saveF(nf));added++;
        }
      });
      Promise.all(promises).then(function(){render()});
    }
    var msg="✓ "+(updated?updated+" pago"+(updated>1?"s":"")+" actualizado"+(updated>1?"s":""):"")+(added?(updated?" y ":"")+added+" nueva"+(added>1?"s":""):"");
    showToast(msg||"✓ Sin cambios.");
  }).catch(function(){showToast("Error al conectar Gmail.",true)}).then(function(){
    document.getElementById("syncBtn").textContent="⟳ Gmail";document.getElementById("syncBtn").disabled=false;
  });
}

}
