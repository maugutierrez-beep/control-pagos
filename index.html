function sbHeaders(){return{"Content-Type":"application/json","apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}}

function sbGet(table){
  return fetch(SB_URL+"/rest/v1/"+table+"?select=*",{headers:sbHeaders()}).then(function(r){return r.json()});
}
function sbUpsert(table,rows){
  return fetch(SB_URL+"/rest/v1/"+table,{
    method:"POST",
    headers:Object.assign({},sbHeaders(),{"Prefer":"resolution=merge-duplicates"}),
    body:JSON.stringify(rows)
  });
}
function sbDelete(table,id){
  return fetch(SB_URL+"/rest/v1/"+table+"?id=eq."+encodeURIComponent(id),{

  });
}

function cop(n){return new Intl.NumberFormat("es-CO",{style:"currency",currency:"COP",maximumFractionDigits:0}).format(n||0)}
function hoy(){return new Date()}
function mAct(){var d=hoy();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")}
function mLbl(ym){if(!ym)return"—";var p=ym.split("-");return ML[+p[1]-1]+" "+p[0]}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

function fV(f){
  var d=hoy(),ref=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  var mk=function(y,m){var fin=new Date(y,m+1,0).getDate();return new Date(y,m,Math.min(f.d,fin))};
  var fecha=mk(d.getFullYear(),d.getMonth()),dif=Math.round((fecha-ref)/864e5);
  if(dif<-5){fecha=mk(d.getFullYear(),d.getMonth()+1);dif=Math.round((fecha-ref)/864e5)}
  return{fecha:fecha,dif:dif};
}
function est(f){if(f.pm===mAct())return"pagada";var d=fV(f).dif;return d<0?"venc":d<=5?"prox":"pend"}
function matchQ(f){if(!query)return true;var q=query.toLowerCase();return(f.n||"").toLowerCase().indexOf(q)>-1||(f.c||"").toLowerCase().indexOf(q)>-1||(f.p||"").toLowerCase().indexOf(q)>-1||(f.no||"").toLowerCase().indexOf(q)>-1}

    if(F.length===0&&!seeded){seeded=true;seedData();}
    else{F=F.map(function(f){return Object.assign({},f,{m:Number(f.m),d:Number(f.d)})});render();}
  }).catch(function(e){
    showToast("Error conectando a Supabase. Revisá la conexión.",true);
    document.getElementById("content").innerHTML='<div class="empty">Error de conexión.</div>';
  });
}

  var rows=SEED.map(function(s){

}

function delF(id){return sbDelete("facturas",id);}

function render(){
  var base=F.filter(function(f){return(fCat==="Todas"||f.c===fCat)&&(fProp==="Todas"||f.p===fProp)&&matchQ(f)});
  var allM=F.reduce(function(s,f){return s+f.m},0);
  var pgM=F.filter(function(f){return est(f)==="pagada"}).reduce(function(s,f){return s+f.m},0);
  var pct=allM>0?Math.round(pgM/allM*100):0;
  document.getElementById("progress").innerHTML='<div class="pbar"><div class="plbl"><span>'+pct+'% pagado</span><b>Falta: '+cop(allM-pgM)+'</b></div><div class="ptrack"><div class="pfill" style="width:'+pct+'%"></div></div></div>';
  var t=0,pg=0,pe=0,ve=0;
  base.forEach(function(f){t+=f.m;var e=est(f);if(e==="pagada")pg+=f.m;else if(e==="venc")ve+=f.m;else pe+=f.m});
  document.getElementById("totales").innerHTML=[["Total",t,"#1e293b"],["Pagado",pg,"#15803d"],["Pendiente",pe,"#b45309"],["Vencido",ve,"#dc2626"]].map(function(x){return'<div class="tot"><div class="tl">'+x[0]+'</div><div class="tv" style="color:'+x[2]+'">'+cop(x[1])+'</div></div>'}).join("");
  if(vista==="porpagar"&&!query){
    var pn=F.filter(function(f){return est(f)!=="pagada"});
    var vc=pn.filter(function(f){return fV(f).dif<0});
    var hh=pn.filter(function(f){return fV(f).dif===0});
    var mn=pn.filter(function(f){return fV(f).dif===1});
    var ft=pn.filter(function(f){return fV(f).dif>1}).sort(function(a,b){return fV(a).dif-fV(b).dif});
    var a="";
    if(vc.length)a+=mkAc("red","⚠ "+vc.length+" vencida"+(vc.length>1?"s":"")+" · "+cop(vc.reduce(function(s,f){return s+f.m},0)),vc);
    if(hh.length)a+=mkAc("red","Hoy · "+cop(hh.reduce(function(s,f){return s+f.m},0)),hh);
    if(mn.length)a+=mkAc("amb","Mañana · "+cop(mn.reduce(function(s,f){return s+f.m},0)),mn);
    if(!vc.length&&!hh.length&&!mn.length){
      if(ft.length){var dd=fV(ft[0]).dif;var g=ft.filter(function(f){return fV(f).dif===dd});var fch=fV(g[0]).fecha;
        a+=mkAc("blu","Próximo: "+fch.getDate()+" "+MS[fch.getMonth()]+" · en "+dd+"d · "+cop(g.reduce(function(s,f){return s+f.m},0)),g);}
      else a='<div class="ac grn"><div class="at">✓ Todo al día</div></div>';
    }
    document.getElementById("alerta").innerHTML=a;
  }else document.getElementById("alerta").innerHTML="";
  document.getElementById("searchBox").style.display=(vista==="porpagar"||vista==="pagadas")?"block":"none";
  var npg=F.filter(function(f){return est(f)==="pagada"}).length;
  var npp=F.length-npg;
  document.getElementById("tabs").innerHTML=[["porpagar","Por pagar ("+npp+")"],["pagadas","Pagadas ("+npg+")"],["propiedad","Propiedad"],["historico","Histórico"]].map(function(x){return'<button class="'+(vista===x[0]?"on":"")+'" onclick="setVista(\''+x[0]+'\')">'+x[1]+'</button>'}).join("");
  if(vista==="porpagar"||vista==="pagadas"){
    var ps=["Todas"];var seen={};F.forEach(function(f){if(f.p&&f.p!=="—"&&!seen[f.p]){seen[f.p]=1;ps.push(f.p)}});ps.sort();
    document.getElementById("chips").innerHTML=
      ["Todas"].concat(CATS).map(function(c){return'<button class="chip'+(fCat===c?" on":"")+'" onclick="setFCat(\''+esc(c)+'\')">'+esc(c)+'</button>'}).join("")+
      '<span style="width:6px;display:inline-block"></span>'+
      ps.map(function(p){return'<button class="chip pur'+(fProp===p?" on":"")+'" onclick="setFProp(\''+esc(p)+'\')">'+esc(p==="Todas"?"Todas prop.":p)+'</button>'}).join("");
  }else document.getElementById("chips").innerHTML="";
  var ct=document.getElementById("content");
  if(vista==="porpagar"||vista==="pagadas"){
    var list=base.filter(function(f){return vista==="pagadas"?est(f)==="pagada":est(f)!=="pagada"});
    if(vista==="pagadas")list.sort(function(a,b){return a.n.localeCompare(b.n)});
    else{var o={venc:0,prox:1,pend:2};list.sort(function(a,b){return o[est(a)]-o[est(b)]||fV(a).dif-fV(b).dif});}
    if(!list.length){ct.innerHTML='<div class="empty">'+(query?"Sin resultados":"vista"==="pagadas"?"No hay pagadas.":"¡Todo al día!")+'</div>';return;}
    ct.innerHTML=list.map(function(f){
      var e=est(f),r=fV(f),fs=r.fecha.getDate()+" "+MS[r.fecha.getMonth()]+" "+r.fecha.getFullYear();
      var rel=r.dif<0?"venció hace "+Math.abs(r.dif)+"d":r.dif===0?"hoy":r.dif===1?"mañana":"en "+r.dif+"d";
      var pt=f.p&&f.p!=="—"?'<span class="ptag">'+esc(f.p)+'</span>':"";
      var cp=f.cp?'<div class="cp">✓ '+esc(f.cp)+(f.cn?" · "+esc(f.cn):"")+'</div>':"";
      var mt=e==="pagada"?"Pagada en <b>"+mLbl(f.pm)+"</b>":"Vence <b>"+fs+"</b> · "+rel;
      var btns=e==="pagada"?'<button class="undo" onclick="doUndo(\''+f.id+'\')">↩</button>':'<button class="pg" onclick="doPg(\''+f.id+'\')">✓</button>';
      btns+='<button class="edt" onclick="doEdit(\''+f.id+'\')">✎</button><button class="del" onclick="doDel(\''+f.id+'\')">✕</button>';
      return'<div class="row '+(e==="pagada"?"pagada":e)+'"><div class="info"><div class="nm">'+esc(f.n)+pt+'</div><div class="meta">'+esc(f.c)+' · '+mt+'</div>'+(f.no?'<div class="nt">'+esc(f.no)+'</div>':'')+cp+'</div><div class="mn">'+cop(f.m)+'</div><div class="acc">'+btns+'</div></div>';
    }).join("");
  }
  if(vista==="propiedad"){
    var mp={};F.forEach(function(f){if(!f.p||f.p==="—")return;if(!mp[f.p])mp[f.p]={t:0,pg:0,pe:0,items:[]};mp[f.p].t+=f.m;mp[f.p].items.push(f);if(est(f)==="pagada")mp[f.p].pg+=f.m;else mp[f.p].pe+=f.m;});
    ct.innerHTML=Object.keys(mp).sort(function(a,b){return mp[b].t-mp[a].t}).map(function(prop){var d=mp[prop];
      return'<div class="pcard"><div class="ph"><div><div class="pn">'+esc(prop)+'</div><div class="ps">'+d.items.length+' factura'+(d.items.length>1?"s":"")+'</div></div><div style="text-align:right"><div class="ptt">'+cop(d.t)+'</div><div class="ps">'+cop(d.pg)+' pagado · '+cop(d.pe)+' pend.</div></div></div>'+d.items.map(function(f){var e=est(f);return'<div class="pi"><span>'+esc(f.n)+' <span class="est '+(e==="pagada"?"epg":e==="venc"?"evc":"epe")+'">'+(e==="pagada"?"✓":"Pend.")+'</span></span><span style="font-weight:600">'+cop(f.m)+'</span></div>';}).join("")+'</div>';
    }).join("")||'<div class="empty">No hay facturas con propiedad.</div>';
  }
  if(vista==="historico"){
    var meses=[];var mseen={};H.forEach(function(h){if(!mseen[h.mes]){mseen[h.mes]=1;meses.push(h.mes);}});meses.sort().reverse();
    var htot={};H.forEach(function(h){htot[h.mes]=(htot[h.mes]||0)+h.m;});
    var hf=hMes?H.filter(function(h){return h.mes===hMes;}):H;
    var html='<div class="chips"><button class="chip'+(!hMes?" on":"")+'" onclick="setHMes(null)">Todos</button>';
    meses.forEach(function(m){html+='<button class="chip'+(hMes===m?" on":"")+'" onclick="setHMes(\''+m+'\')">'+mLbl(m)+'</button>';});
    html+='</div>';
    if(meses.length&&!hMes){
      html+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">';
      meses.forEach(function(m){html+='<div class="hmcard" onclick="setHMes(\''+m+'\')"><div style="font-size:11px;color:#94a3b8;margin-bottom:4px">'+mLbl(m)+'</div><div style="font-size:16px;font-weight:600;color:#15803d">'+cop(htot[m]||0)+'</div></div>';});
      html+='</div>';
    }
    if(!hf.length)html+='<div class="empty">Los pagos de meses anteriores se archivan aquí.</div>';
    else hf.forEach(function(h){html+='<div class="hcard"><div class="info"><div class="nm">'+esc(h.n)+(h.p&&h.p!=="—"?'<span class="ptag">'+esc(h.p)+'</span>':"")+'</div><div class="meta">'+esc(h.c)+' · '+mLbl(h.mes)+'</div>'+(h.cp?'<div class="cp">✓ '+esc(h.cp)+(h.cn?" · "+esc(h.cn):"")+'</div>':"")+'</div><div class="mn">'+cop(h.m)+'</div></div>';});
    ct.innerHTML=html;
  }
  document.getElementById("backup").innerHTML='<div class="bkp"><button onclick="descargar()">⬇ Descargar respaldo</button></div>';
}

function mkAc(cls,titulo,items){
  return'<div class="ac '+cls+'"><div class="at">'+titulo+'</div><div class="ai">'+items.map(function(f){return'<div><span>'+esc(f.n)+'</span><span class="am">'+cop(f.m)+'</span></div>';}).join("")+'</div></div>';
}

function setVista(v){vista=v;render();}
function setFCat(c){fCat=c;render();}
function setFProp(p){fProp=p;render();}
function setHMes(m){hMes=m;render();}
function onSearch(){query=document.getElementById("searchInput").value;render();}

function doPg(id){pgId=id;var f=F.find(function(x){return x.id===id;});if(!f)return;document.getElementById("pgName").textContent=f.n+" · "+cop(f.m);document.getElementById("pgRef").value="";document.getElementById("pgNota").value="";document.getElementById("pgModal").classList.add("open");}
function closePg(){document.getElementById("pgModal").classList.remove("open");}
function doPago(skip){
  var cp=skip?"":document.getElementById("pgRef").value.trim();
  var cn=skip?"":document.getElementById("pgNota").value.trim();
  var f=F.find(function(x){return x.id===pgId;});
  if(!f)return;
  f.pm=mAct();f.cp=cp;f.cn=cn;
  saveF(f).then(function(){render();showToast("✓ Pago registrado.");});
  closePg();
}
function doUndo(id){
  var f=F.find(function(x){return x.id===id;});
  if(!f)return;
  f.pm=null;f.cp="";f.cn="";
  saveF(f).then(function(){render();});
}
function doEdit(id){openModal(F.find(function(f){return f.id===id;}));}
function doDel(id){
  F=F.filter(function(f){return f.id!==id;});
  delF(id).then(function(){render();showToast("Factura eliminada.");});
}

function openModal(f){
  editId=f?f.id:null;
  document.getElementById("mTit").textContent=f?"Editar":"Nueva factura";
  document.getElementById("fn").value=f?f.n:"";
  var fc=document.getElementById("fc");fc.innerHTML=CATS.map(function(c){return"<option>"+c+"</option>";}).join("");fc.value=f?f.c:CATS[0];
  var fp=document.getElementById("fp");fp.innerHTML=PROPS.map(function(p){return"<option>"+p+"</option>";}).join("");fp.value=f?f.p:"—";
  document.getElementById("fm").value=f?f.m:"";
  document.getElementById("fd").value=f?f.d:"";
  document.getElementById("fno").value=f?(f.no||""):"";
  document.getElementById("modal").classList.add("open");
}
function closeModal(){document.getElementById("modal").classList.remove("open");}
function saveModal(){
  var n=document.getElementById("fn").value.trim(),m=Number(document.getElementById("fm").value),d=Number(document.getElementById("fd").value);
  if(!n||!d){showToast("Completa concepto y día.",true);return;}
  var data={n:n,c:document.getElementById("fc").value,p:document.getElementById("fp").value,m:m||0,d:Math.max(1,Math.min(31,d)),no:document.getElementById("fno").value.trim()};
  if(editId){
    var f=F.find(function(x){return x.id===editId;});
    if(f){Object.assign(f,data);saveF(f).then(function(){render();});}
  }else{
    var nf={id:Date.now()+"",pm:null,cp:"",cn:"",n:data.n,c:data.c,p:data.p,m:data.m,d:data.d,no:data.no};
    F.push(nf);saveF(nf).then(function(){render();});
  }
  closeModal();
}

document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeModal();});
document.getElementById("pgModal").addEventListener("click",function(e){if(e.target.id==="pgModal")closePg();});

function exportar(){
  var pend=F.filter(function(f){return est(f)!=="pagada";}).sort(function(a,b){return fV(a).dif-fV(b).dif;});
  var pagadas=F.filter(function(f){return est(f)==="pagada";});
  var d=hoy();var hoyStr=d.getDate()+" "+MS[d.getMonth()]+" "+d.getFullYear();
  var txt="CONTROL DE PAGOS – GVC Capital\n"+hoyStr+"\n\nPENDIENTES ("+pend.length+"):\n";
  pend.forEach(function(f){var r=fV(f);txt+="• "+f.n+" – "+cop(f.m)+" – vence "+r.fecha.getDate()+" "+MS[r.fecha.getMonth()]+"\n";});
  txt+="\nTotal pendiente: "+cop(pend.reduce(function(s,f){return s+f.m;},0))+"\n\nPAGADAS ("+pagadas.length+"):\n";
  pagadas.forEach(function(f){txt+="• "+f.n+" – "+cop(f.m)+(f.cp?" – "+f.cp:"")+"\n";});
  txt+="\nTotal pagado: "+cop(pagadas.reduce(function(s,f){return s+f.m;},0));
  try{navigator.clipboard.writeText(txt);showToast("✓ Resumen copiado.");}catch(e){showToast("Error al copiar.",true);}
}

function descargar(){
  var blob=new Blob([JSON.stringify({f:F,h:H},null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="control-pagos-respaldo.json";a.click();
  showToast("✓ Respaldo descargado.");
}

function syncGmail(){
  document.getElementById("syncBtn").textContent="⏳…";
  document.getElementById("syncBtn").disabled=true;
  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2000,
      messages:[{role:"user",content:"Search my Gmail for the last 30 days. Find: 1) Payment confirmations (transacción aprobada, pago exitoso, recibo de caja, ecollect) 2) New invoices from utilities. Respond ONLY with JSON array, no markdown. Each: {\"type\":\"paid\" or \"invoice\",\"name\":\"service name\",\"amount\":number,\"date\":\"YYYY-MM-DD\",\"ref\":\"reference\",\"due_day\":number,\"category\":\"Servicios Públicos\",\"notes\":\"brief\"}"}],
      mcp_servers:[{type:"url",url:"https://gmailmcp.googleapis.com/mcp/v1",name:"gmail"}]
    })
  }).then(function(r){return r.json();}).then(function(data){
    var txt=(data.content||[]).filter(function(c){return c.type==="text";}).map(function(c){return c.text;}).join("");
    var clean=txt.replace(/```json|```/g,"").trim();
    var updated=0,added=0,promises=[];
    if(clean.charAt(0)==="["){
      var items=JSON.parse(clean);
      items.forEach(function(p){
        var nm=(p.name||"").toLowerCase();
        var match=F.find(function(f){return f.n.toLowerCase().indexOf(nm)>-1&&f.pm!==mAct();});
        if(match&&p.type==="paid"){match.pm=mAct();match.cp=p.ref||"Gmail";match.cn=p.date||"";promises.push(saveF(match));updated++;}
        else if(p.amount>0&&!F.some(function(f){return f.n.toLowerCase().indexOf(nm)>-1;})){
          var nf={id:"s"+Date.now()+Math.random().toString(36).slice(2,5),n:p.name,c:p.category||"Servicios Públicos",p:"—",m:p.amount,d:p.due_day||1,no:p.notes||"",pm:p.type==="paid"?mAct():null,cp:p.type==="paid"?(p.ref||"Gmail"):"",cn:p.type==="paid"?(p.date||""):""};
          F.push(nf);promises.push(saveF(nf));added++;
        }
      });
      Promise.all(promises).then(function(){render();});
    }
    var msg="✓ "+(updated?updated+" pago"+(updated>1?"s":"")+" actualizado"+(updated>1?"s":""):"")+(added?(updated?" y ":"")+added+" nueva"+(added>1?"s":""):"");
    showToast(msg||"✓ Sin cambios.");
  }).catch(function(){showToast("Error al conectar Gmail.",true);}).then(function(){
    document.getElementById("syncBtn").textContent="⟳ Gmail";document.getElementById("syncBtn").disabled=false;
  });
}

function showToast(msg,err){
  document.getElementById("toast").innerHTML='<div class="toast '+(err?"err":"ok")+'">'+esc(msg)+'</div>';
  setTimeout(function(){document.getElementById("toast").innerHTML="";},4000);
}

load();
</script>
</body></html>
